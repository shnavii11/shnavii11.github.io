<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f1ec" />
    <title>Portfolio Vaishnavi</title>
    <meta name="description" content="Portfolio Vaishnavi — whimsical, creative, tech." />
  </head>
  <body>
    <!-- Static marbled flow field. Rendered once, drifts via CSS transform. -->
    <svg class="flow-field" aria-hidden="true" preserveAspectRatio="none" viewBox="0 0 100 100">
      <defs>
        <filter id="silk" x="0" y="0" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.011 0.015" numOctaves="2" seed="3" result="noise"/>
          <feGaussianBlur in="noise" stdDeviation="1.4" result="blurred"/>
          <feColorMatrix in="blurred" type="matrix" values="
            0 0 0 0 0.10
            0 0 0 0 0.10
            0 0 0 0 0.10
            0 0 0 0.22 0"/>
        </filter>
        <filter id="silk-2" x="0" y="0" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.005 0.009" numOctaves="2" seed="11" result="noise2"/>
          <feGaussianBlur in="noise2" stdDeviation="2" result="blurred2"/>
          <feColorMatrix in="blurred2" type="matrix" values="
            0 0 0 0 0.08
            0 0 0 0 0.08
            0 0 0 0 0.08
            0 0 0 0.14 0"/>
        </filter>
      </defs>
      <rect width="100" height="100" filter="url(#silk-2)" fill="white"/>
      <rect width="100" height="100" filter="url(#silk)" fill="white"/>
    </svg>

    <div id="water" class="water" aria-hidden="true">
      <div class="water-blob water-blob--a"></div>
      <div class="water-blob water-blob--b"></div>
    </div>
    <main id="app">
      <header class="brand">
        <span class="brand-mark">Portfolio Vaishnavi</span>
        <span class="brand-sub">whimsical · creative · tech</span>
      </header>

      <section class="stage" aria-label="Card stack">
        <div id="stack" class="stack" role="list"></div>
      </section>

      <nav class="controls" aria-label="Stack controls">
        <button class="nav-btn" id="prev" aria-label="Previous card">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div id="dots" class="dots" role="tablist"></div>
        <button class="nav-btn" id="next" aria-label="Next card">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </nav>

      <div id="themes" class="themes" aria-label="Theme switcher"></div>

      <footer class="foot">
        <span>click any card to bring it forward</span>
      </footer>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
